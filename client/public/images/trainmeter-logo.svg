<svg width="1200" height="720" viewBox="0 0 1200 720" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="goldArc" x1="330" y1="120" x2="745" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#F7D34A"/>
      <stop offset="55%" stop-color="#ECB10C"/>
      <stop offset="100%" stop-color="#C98D00"/>
    </linearGradient>

    <linearGradient id="steelDark" x1="230" y1="395" x2="820" y2="395" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1C2432"/>
      <stop offset="50%" stop-color="#334155"/>
      <stop offset="100%" stop-color="#1C2432"/>
    </linearGradient>

    <linearGradient id="steelPlate" x1="0" y1="320" x2="0" y2="520" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#9CA3AF"/>
      <stop offset="45%" stop-color="#4B5563"/>
      <stop offset="100%" stop-color="#1F2937"/>
    </linearGradient>

    <linearGradient id="needleGold" x1="420" y1="255" x2="620" y2="286" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#F7D34A"/>
      <stop offset="60%" stop-color="#ECB10C"/>
      <stop offset="100%" stop-color="#D69E05"/>
    </linearGradient>

    <linearGradient id="meterText" x1="640" y1="560" x2="1005" y2="560" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#F7D34A"/>
      <stop offset="55%" stop-color="#ECB10C"/>
      <stop offset="100%" stop-color="#C98D00"/>
    </linearGradient>

    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- icon -->
  <g transform="translate(110,40)">
    <!-- gauge -->
    <path
      d="M111 215C140 135 214 84 300 84C373 84 438 121 474 185"
      stroke="url(#goldArc)"
      stroke-width="40"
      stroke-linecap="butt"
      stroke-dasharray="82 18 82 18 82"
      filter="url(#softGlow)"
    />

    <!-- dark left arc -->
    <path
      d="M109 216C128 165 160 126 202 101"
      stroke="#1F2937"
      stroke-width="40"
      stroke-linecap="butt"
      stroke-dasharray="72 18"
      opacity="0.95"
    />

    <!-- inner subtle shadow arc -->
    <path
      d="M145 210C180 152 237 122 304 122"
      stroke="#111827"
      stroke-width="9"
      stroke-linecap="round"
      opacity="0.5"
    />

    <!-- dumbbell bar -->
    <rect x="162" y="260" width="188" height="18" rx="4" fill="url(#steelDark)"/>

    <!-- left plates -->
    <rect x="110" y="246" width="18" height="46" rx="2" fill="url(#steelPlate)"/>
    <rect x="138" y="214" width="24" height="112" rx="2" fill="url(#steelPlate)"/>
    <rect x="172" y="196" width="34" height="148" rx="2" fill="url(#steelPlate)"/>

    <!-- right plates -->
    <rect x="384" y="246" width="18" height="46" rx="2" fill="url(#steelPlate)"/>
    <rect x="350" y="214" width="24" height="112" rx="2" fill="url(#steelPlate)"/>
    <rect x="306" y="196" width="34" height="148" rx="2" fill="url(#steelPlate)"/>

    <!-- center hub -->
    <circle cx="256" cy="208" r="8" fill="#EAB308" opacity="0.35"/>

    <!-- stylized T needle -->
    <path
      d="M209 186H346L275 210L254 318L226 298L239 216H199L209 186Z"
      fill="url(#needleGold)"
      filter="url(#softGlow)"
    />
  </g>

  <!-- text -->
  <g>
    <text
      x="180"
      y="640"
      font-family="Inter, Arial, Helvetica, sans-serif"
      font-size="150"
      font-weight="900"
      font-style="italic"
      fill="#F3F4F6"
      letter-spacing="-5"
    >Train</text>

    <text
      x="640"
      y="640"
      font-family="Inter, Arial, Helvetica, sans-serif"
      font-size="150"
      font-weight="900"
      font-style="italic"
      fill="url(#meterText)"
      letter-spacing="-5"
    >Meter</text>
  </g>
</svg>