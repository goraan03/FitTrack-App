version: "3.8"

services:
  # =========================
  # MySQL Database
  # =========================
  mysql:
    image: mysql:8.0
    container_name: trainmeter-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    # ports:
    #   - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - trainmeter-network
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # =========================
  # Backend (Node API)
  # =========================
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: trainmeter-api
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      DB_NAME: ${MYSQL_DATABASE}
      DB_SSL_MODE: DISABLED

      PORT: 4000
      NODE_ENV: production

      JWT_SECRET: ${JWT_SECRET}
      SALT_ROUNDS: ${SALT_ROUNDS}

      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_SECURE: ${SMTP_SECURE}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      EMAIL_FROM: ${EMAIL_FROM}
      TEST_EMAIL: ${EMAIL_TEST}
      CONTACT_EMAIL: ${CONTACT_EMAIL}
      BACKOFFICE_API_KEY: ${BACKOFFICE_API_KEY}
      BACKOFFICE_URL: ${BACKOFFICE_URL}
      CORS_ORIGIN: ${CORS_ORIGIN}
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./server/invoices:/app/invoices
      - ./server/logs:/app/logs
    networks:
      - trainmeter-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:4000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # =========================
  # Frontend (React + Nginx)
  # =========================
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        VITE_API_URL: "https://api.trainmeter.app/api/"
    container_name: fittrack-client
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      server:
        condition: service_started
    networks:
      - trainmeter-network

volumes:
  mysql_data:

networks:
  trainmeter-network:
    driver: bridge
